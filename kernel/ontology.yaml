# kernel/ontology.yaml — AxiomCE hybrid-prototype ontology
# Plain documentation + machine-readable schema. No YAML library is required to
# use the store: tools/generate-views.mjs parses only JSONL claims and Markdown
# front matter. This file is the contract that keeps every future agent aligned.

version: 0.1.0
status: prototype
updated: 2026-07-17

# ---------------------------------------------------------------------------
# Entity identity
# ---------------------------------------------------------------------------
entity:
  # entity_id is opaque and permanent: "<type>:<slug>". Never renamed.
  # Display names/aliases are attributes, not keys.
  id_format: "<type>:<kebab-slug>"
  filename_rule: "colon is illegal on Windows; entity files use '<type>-<slug>.md'"
  types:
    - person
    - organization
    - vehicle
    - finance        # a financial domain/aggregate (e.g. finance:budget)
    - project
    - event
    - place
    - account        # identity only; never store full numbers (see Never-store)
    - source         # a provenance record

# ---------------------------------------------------------------------------
# Claim schema (one JSON object per line in a .jsonl file)
# ---------------------------------------------------------------------------
claim:
  required: [id, entity, predicate, value, confidence, classification, valid_from, asserted_at, source]
  optional: [valid_to, retracted_at, retraction_reason, supersedes, note]
  fields:
    id:             "clm-<domain>-NNNN, stable and unique"
    entity:         "an entity_id"
    predicate:      "kebab-case slug; OPEN vocabulary, documented per entity"
    value:          "compact prose or scalar — NOT decomposed into rigid triples"
    confidence:     "one of confidence.levels"
    classification: "one of privacy.classifications"
    valid_from:     "YYYY-MM-DD — when true in the world"
    valid_to:       "YYYY-MM-DD or null — null = still current"
    asserted_at:    "ISO timestamp — when recorded"
    retracted_at:   "ISO timestamp or null — when withdrawn"
    retraction_reason: "free text; required when retracted_at is set (Axiom 24 audited retraction)"
    supersedes:     "claim id this replaces, or null"
    source:         "source-record id or canonical entity id (MUST be present)"
    note:           "optional free prose"

# When to mint a claim (NOT for everything — narrative stays in canonical records)
claim_when:
  - atomic          # a single discrete fact
  - time_varying    # a value that changes over time (price, condition, status)
  - conflicting     # sources disagree; keep both, resolve explicitly
  - decision_relevant  # feeds a "can I afford / should I" decision
  - queryable       # something an agent will look up directly

# ---------------------------------------------------------------------------
# Epistemics
# ---------------------------------------------------------------------------
confidence:
  levels: [confirmed, user-stated, inferred, estimate, unresolved]
  ordering: "confirmed > user-stated > inferred > estimate > unresolved"

# ---------------------------------------------------------------------------
# Temporal / lifecycle semantics
# ---------------------------------------------------------------------------
lifecycle:
  active: "retracted_at is null AND not superseded by another claim AND (valid_to is null or >= today)"
  superseded: "another claim's supersedes == this claim.id"
  retracted: "retracted_at is set (via `runner.mjs retract --id <claim> --reason` — Axiom 24: withdraws a fact as wrong/void, kept in history, audited to runtime/delegated-audit.jsonl; distinct from supersede, which replaces with a newer fact)"
  expired: "valid_to is in the past"
  contradiction: ">1 active claim sharing the same entity+predicate"
  dormant: "A contradiction unresolved past policy.dormancy_days with NO new evidence (Axiom 12). Auto-parked off the active 'needs-you' surface into a still-visible `dormant` bucket. Parking is NOT resolution: both sides are preserved and it reactivates automatically the instant a newer claim touches the predicate. Age = days since the most recent asserted_at on the set."

# ---------------------------------------------------------------------------
# Policy (human-set knobs; single source of truth for governance thresholds)
# ---------------------------------------------------------------------------
policy:
  # Axiom 12 dormancy threshold. A contradiction with no new evidence for this
  # many days is auto-parked (still visible; reactivates on a newer claim). The
  # ratified spec also names an "OR N sync cycles" trigger; that needs a
  # persistent runtime cycle counter (not yet built), so the portable engine
  # currently parks on elapsed time only — a strict subset that never parks
  # earlier than the cycle rule would. Edit DEFAULT_DORMANCY_DAYS in
  # tools/generate-views.mjs (or pass classify(..,{dormancyDays})) to change it.
  dormancy_days: 90

  # Axiom 18 — delegated ratification. A human-authored policy MAY let the runner
  # auto-promote the clean/"ready" bucket and surface evidence-decisive
  # contradictions. DEFAULTS ARE THE SAFE FLOOR: zero automation — everything is
  # surfaced for human ratification (sampling starts at 100% surfaced; the human
  # ramps automation UP). Policy is human-authored, never model-self-certified;
  # every delegated decision is audited (runtime/delegated-audit.jsonl) and
  # reversible (Axiom 24). Edit DEFAULT_RATIFY_POLICY in tools/runner.mjs or pass
  # `auto-ratify --auto-ready --ceiling <class> --ratio <n>`.
  delegated_ratification:
    auto_ratify_ready: false        # (a) auto-promote clean bucket? default off
    classification_ceiling: public  # ...only at/below this sensitivity
    decisive_source_ratio: 3        # (b) distinct-source ratio bar (ax10 weight)
    # LIMITATION (honest): the ratified decisive-evidence bar also requires "the
    # losing side has no higher provenance-TIER confirming source" and an
    # "authoritative source" disconfirmation branch. The claim schema models
    # provenance as a single `source` STRING with NO tier, so those clauses are
    # UNCOMPUTABLE. Contradiction auto-RESOLVE is therefore ADVISORY only: the
    # runner surfaces "meets N:1 ratio" for one-step human confirmation and does
    # NOT auto-write a contradiction resolution to canon. Full auto-resolve is
    # blocked on adding a provenance-tier field (a schema change needing
    # ratification).

# ---------------------------------------------------------------------------
# Queue triage (surfacing the pending ratification queue)
# ---------------------------------------------------------------------------
triage:
  # `runner.mjs triage` sorts the pending ratification queue into buckets, in
  # priority order. Each queued claim lands in exactly one bucket. It is a
  # categorizer, NOT a gate — nothing is blocked, only surfaced.
  buckets: [privacy-hold, needs-clarification, contradiction, ready]
  privacy_hold: "not an explicit public class (restricted/sensitive OR missing/unknown) — you decide; never automated"
  needs_clarification: "confidence unresolved — a human must clarify"
  contradiction: "promoting would create/join a live contradiction against canon"
  ready: "clean: settled confidence, public/personal, no conflict"
  hard_excluded_from_automation: [privacy-hold, needs-clarification]

# ---------------------------------------------------------------------------
# Dead-letter quarantine (rt-dead-letter)
# ---------------------------------------------------------------------------
dead_letter:
  # `sync --apply` runs unattended, so a single poison observation must NOT
  # abort the whole run. Candidates that fail the gates (malformed JSON, missing
  # entity, schema/privacy violations) are set aside per-record; the clean
  # candidates still enqueue. Inspect with `runner.mjs dead-letter`.
  store: "private/runtime/dead-letter.jsonl (PRIVATE-only, fail-closed)"
  why_private: "a rejected candidate's classification is untrusted and its raw text may hold sensitive data, so quarantine never lands in a tracked file"
  key: "dl_key = hash of the exact trimmed source line — stable across file/line shifts; a later sync skips an already-quarantined line, so it never re-floods problems or blocks progress"
  reprocess: "edit the offending source line (changes dl_key) and re-sync; the corrected line is processed normally, the old quarantine record is inert"
  record: "{ dl_key, source_file, line, problems[], raw, quarantined_at }"

# ---------------------------------------------------------------------------
# Runtime schema versioning (rt-schema-versioning)
# ---------------------------------------------------------------------------
schema_version:
  # The on-disk runtime store carries an explicit version so a newer engine can
  # migrate an older store forward, and an older engine REFUSES to write a store
  # a newer engine created (rather than silently corrupting it).
  current: 1
  marker: "runtime/schema.json = { schema_version, updated_at } — public partition IS the authority for the store's version"
  inference: "no marker + empty store -> treated as CURRENT (fresh); no marker + in-use store (ledger/queue/audit/dead-letter/runs present) -> treated as 0 (legacy, pre-versioning)"
  enforcement: "ensureSchema runs inside the writer lock on every mutation: declared > current THROWS (refuse to corrupt); declared == current stamps the marker if missing; declared < current applies MIGRATIONS in order then stamps"
  migrations: "MIGRATIONS is an ordered [{ from, to, migrate }] chain from 0 to current; v0->v1 is a no-op because v1 IS the pre-versioning shape"
  inspect: "runner.mjs schema [--apply] — report engine vs store version; --apply migrates a behind store now under the lock"
  manifest: "each run manifest records schema_version for traceability"

# ---------------------------------------------------------------------------
# View generation
# ---------------------------------------------------------------------------
view:
  generated: true            # never hand-edit *.view.md; regenerate
  # When a predicate is contradicted (>1 active claim), the view names a
  # GOVERNING claim. Axiom 10 — evidence outranks confidence: rank by evidence
  # weight (count of DISTINCT sources asserting the same value) FIRST, then use
  # `governing_precedence` only as the tiebreaker, then lowest claim id. The
  # governing pick is an evidence-weighted DEFAULT surfaced for convenience — it
  # is NOT a resolution; a live contradiction stays UNRESOLVED until a human
  # ratifies (Axiom 18). Within the confidence tiebreak, an explicit
  # `unresolved` safety guard OUTRANKS an optimistic `estimate` — "unknown" must
  # not be overridden by a guess.
  governing_precedence: [confirmed, user-stated, inferred, unresolved, estimate]

# ---------------------------------------------------------------------------
# Reconciliation (canonical prose <-> active claims)
# ---------------------------------------------------------------------------
reconcile:
  # Explicit manifest of which canonical fields are claim-backed. No fuzzy or
  # semantic comparison is performed. See reconcile/manifest.jsonl and
  # private/reconcile/manifest.jsonl.
  manifest_entry: [entity, predicate, canonical, token]
  token: "literal string expected to appear in `canonical` when it reflects the active claim"
  findings: [MISSING_CLAIM, STALE_CANONICAL, UNRESOLVED_CONTRADICTION, DORMANT_CONTRADICTION, STALE_VIEW]
  never: "reconcile MUST NOT rewrite canonical prose; it only reports"

# ---------------------------------------------------------------------------
# Tooling (all zero-dependency Node; no db/embeddings/service/network)
# ---------------------------------------------------------------------------
tools:
  validate: "tools/validate.mjs — Markdown front matter + links"
  validate_claims: "tools/validate-claims.mjs — .jsonl schema/refs + .yaml well-formedness"
  privacy_check: "tools/privacy-check.mjs — leak scan of tracked .md/.jsonl/.yaml"
  generate_views: "tools/generate-views.mjs — build *.view.md (use --check for staleness)"
  reconcile: "tools/reconcile.mjs — canonical/claim/view divergence report"

# ---------------------------------------------------------------------------
# Privacy
# ---------------------------------------------------------------------------
privacy:
  classifications: [public, personal, sensitive, restricted]
  # Fail-closed default: content routes to the TRACKED public store ONLY when its
  # classification is an explicit public class (public|personal). Everything else
  # — restricted/sensitive AND missing/unknown/invalid — quarantines to private/
  # (git-excluded) and is excluded from public views/exports. Unclassified
  # content is never leaked; classification is required at capture.
  fail_closed: true
  public_classes: [public, personal]
  placement:
    public: tracked
    personal: tracked
    sensitive: "prefer private/ ; tracked only with opt-in"
    restricted: "private/ only (git-excluded)"
    unclassified: "quarantined to private/ ; capture blocks a missing classification"
  never_store:   # not even in private/
    - passwords
    - api_keys_tokens
    - full_bank_account_numbers
    - full_card_numbers
    - ssn
    - auth_codes
  view_routing: "public/personal entity -> views/ ; everything else -> private/views/"
  claim_routing: "public/personal claim -> claims/ ; everything else -> private/claims/"

# ---------------------------------------------------------------------------
# Layer precedence (source of truth)
# ---------------------------------------------------------------------------
layers:
  - raw_imports       # immutable
  - canonical_records # human-editable narrative sources of truth
  - claims            # append-only atomic facts
  - entities          # stable identity + pointers
  - views             # generated, do-not-edit, disposable
